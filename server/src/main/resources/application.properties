spring.application.name=nc
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.profiles.active=dev
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.session.jdbc.initialize-schema=always

spring.jpa.mapping-resources=hibernate/Brand.hbm.xml,hibernate/Color.hbm.xml,hibernate/Product.hbm.xml,hibernate/ProductDetail.hbm.xml, hibernate/Cart.hbm.xml, hibernate/ItemCart.hbm.xml, hibernate/User.hbm.xml

server.servlet.context-path=/api/v1

server.port=${SERVER_PORT}